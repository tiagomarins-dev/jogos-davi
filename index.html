<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Jogos do Davi 🎮</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(160deg, #1a237e 0%, #283593 40%, #4527a0 100%);
    color: #fff;
    min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    padding: 20px;
  }
  main { width: 100%; max-width: 480px; text-align: center; }
  h1 { font-size: 2.2rem; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,.4); }
  .subtitulo { opacity: .85; margin-bottom: 28px; }

  /* cards dos jogos: botões grandes pra dedo de criança */
  .jogos { display: grid; gap: 14px; }
  .jogo {
    display: flex; align-items: center; gap: 16px;
    background: rgba(255,255,255,.12);
    border: 3px solid transparent; border-radius: 18px;
    padding: 18px 20px; min-height: 88px;
    color: #fff; text-decoration: none;
    transition: transform .12s, border-color .15s, background .15s;
    touch-action: manipulation;
  }
  .jogo:active { transform: scale(.97); }
  .jogo:hover { border-color: #ffd54a; background: rgba(255,213,74,.18); }
  .jogo .emoji { font-size: 2.6rem; }
  .jogo .textos { text-align: left; }
  .jogo .nome { font-size: 1.3rem; font-weight: 800; }
  .jogo .desc { font-size: .9rem; opacity: .8; }
  .jogo.em-breve { opacity: .55; pointer-events: none; }
  .jogo .breve {
    margin-left: auto; background: #ffd54a; color: #1a237e;
    font-size: .7rem; font-weight: 800; border-radius: 10px; padding: 4px 10px;
    text-transform: uppercase; letter-spacing: 1px;
  }
</style>
</head>
<body>
<main>
  <h1>🎮 Jogos do Davi</h1>
  <p class="subtitulo">Escolha um jogo pra começar!</p>

  <div class="jogos">
    <a class="jogo" href="futebol/">
      <span class="emoji">⚽</span>
      <span class="textos">
        <span class="nome">Quem é o Jogador?</span><br>
        <span class="desc">Descubra o craque escondido na sombra</span>
      </span>
    </a>

    <a class="jogo em-breve" href="animais/">
      <span class="emoji">🦁</span>
      <span class="textos">
        <span class="nome">Jogo dos Animais</span><br>
        <span class="desc">Em construção...</span>
      </span>
      <span class="breve">Em breve</span>
    </a>
  </div>
</main>
</body>
</html>

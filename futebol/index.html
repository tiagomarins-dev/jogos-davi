<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Quem é o Jogador? ⚽</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  /* ===== Tema estádio ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background:
      radial-gradient(ellipse at 50% -20%, #1c5c34 0%, transparent 60%),
      repeating-linear-gradient(90deg, #0c3d20 0 80px, #0e4525 80px 160px);
    color: #fff;
    min-height: 100%;
    display: flex;
    justify-content: center;
  }
  main { width: 100%; max-width: 560px; padding: 16px; }
  section { display: none; }
  section.ativa { display: block; animation: entrar .3s ease; }
  @keyframes entrar { from { opacity: 0; transform: translateY(10px); } }

  h1 { text-align: center; font-size: 1.9rem; margin: 12px 0 4px; text-shadow: 0 2px 6px rgba(0,0,0,.5); }
  .subtitulo { text-align: center; opacity: .85; margin-bottom: 20px; font-size: .95rem; }

  /* ===== Botões grandes (dedo de criança) ===== */
  button {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    border: none;
    border-radius: 14px;
    font-size: 1.15rem;
    font-weight: 700;
    min-height: 64px;
    width: 100%;
    color: #fff;
  }

  /* ===== Tela inicial ===== */
  .grupo-titulo { font-size: .85rem; text-transform: uppercase; letter-spacing: 1px; opacity: .75; margin: 18px 0 8px; }
  .opcoes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opcoes.quatro { grid-template-columns: 1fr 1fr; }
  @media (min-width: 480px) { .opcoes.quatro { grid-template-columns: repeat(4, 1fr); } }
  .opcao {
    background: rgba(255,255,255,.12);
    border: 3px solid transparent;
    transition: border-color .15s, background .15s;
    padding: 10px;
    line-height: 1.3;
  }
  .opcao small { display: block; font-weight: 400; font-size: .78rem; opacity: .8; }
  .opcao.selecionada { border-color: #ffd54a; background: rgba(255,213,74,.22); }
  #btn-jogar {
    margin-top: 24px;
    background: linear-gradient(180deg, #ffb300, #f57f17);
    font-size: 1.45rem;
    min-height: 72px;
    box-shadow: 0 4px 14px rgba(0,0,0,.4);
  }
  #btn-jogar:active { transform: scale(.98); }
  .recorde-inicial { text-align: center; margin-top: 14px; font-size: 1rem; color: #ffd54a; }
  .aviso-vazio {
    background: rgba(255,80,80,.2); border: 2px dashed #ff8a80; border-radius: 12px;
    padding: 16px; margin-top: 20px; text-align: center; display: none;
  }

  /* ===== Placar eletrônico ===== */
  .placar {
    display: flex; justify-content: space-between; align-items: center;
    background: #071a0e; border: 2px solid #1d5c33; border-radius: 12px;
    padding: 10px 14px; margin-bottom: 14px;
    font-family: "Courier New", monospace; font-weight: 700; font-size: 1.05rem;
    color: #ffd54a;
  }
  .barra-progresso { height: 8px; background: rgba(255,255,255,.15); border-radius: 4px; overflow: hidden; margin-bottom: 14px; }
  .barra-progresso div { height: 100%; width: 0; background: #ffd54a; transition: width .3s; }

  /* ===== Foto do jogador ===== */
  .moldura-foto {
    background: radial-gradient(#f3f1ef, #d8ddee);
    border-radius: 16px;
    display: flex; justify-content: center; align-items: center;
    padding: 10px; margin: 0 auto 14px;
    max-width: min(70vw, 340px);
    box-shadow: 0 6px 18px rgba(0,0,0,.45);
  }
  #foto-jogador { width: 100%; display: block; transition: filter .8s ease; }
  .modo-silhueta #foto-jogador { filter: brightness(0); }
  .modo-embacado #foto-jogador { filter: blur(18px); }
  .modo-embacado.dica-1 #foto-jogador { filter: blur(12px); }
  .modo-embacado.dica-2 #foto-jogador { filter: blur(6px); }
  .revelado #foto-jogador { filter: none !important; }

  /* ===== Dicas ===== */
  #btn-dica {
    background: rgba(255,255,255,.15); min-height: 48px; font-size: 1rem;
    margin-bottom: 8px;
  }
  #btn-dica:disabled { opacity: .4; cursor: default; }
  .dicas { min-height: 24px; text-align: center; font-size: .95rem; margin-bottom: 12px; color: #ffe082; }

  /* ===== Alternativas ===== */
  .alternativas { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 480px) { .alternativas { grid-template-columns: 1fr 1fr; } }
  .alternativa { background: rgba(255,255,255,.14); text-align: left; padding: 8px 16px; transition: background .2s, transform .1s; }
  .alternativa:active { transform: scale(.98); }
  .alternativa.certa { background: #2e7d32 !important; }
  .alternativa.errada { background: #c62828 !important; }
  .alternativa .tecla {
    display: inline-block; background: rgba(0,0,0,.35); border-radius: 8px;
    padding: 2px 9px; margin-right: 10px; font-family: monospace;
  }
  .alternativa:disabled { cursor: default; }
  .resultado-rodada { text-align: center; font-size: 1.2rem; font-weight: 700; min-height: 30px; margin-top: 12px; }

  /* ===== Painel de leitura pós-acerto (bio + ex-times) ===== */
  .painel-craque {
    display: none;
    background: rgba(0,0,0,.4); border: 2px solid #2e7d32; border-radius: 14px;
    padding: 14px 16px; margin-top: 12px;
  }
  .painel-craque.visivel { display: block; animation: entrar .35s ease; }
  .bio-craque { font-size: 1.05rem; line-height: 1.55; }
  .bio-craque span { display: block; margin-bottom: 4px; }
  .titulo-extimes { font-size: .85rem; text-transform: uppercase; letter-spacing: 1px; opacity: .75; margin: 10px 0 6px; }
  .extimes { display: flex; flex-wrap: wrap; gap: 8px; }
  .extime {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.12); border-radius: 10px;
    padding: 6px 10px; font-size: .9rem;
  }
  .extime img { width: 26px; height: 26px; object-fit: contain; }
  #btn-continuar { background: linear-gradient(180deg, #43a047, #2e7d32); min-height: 56px; margin-top: 12px; }

  /* ===== Tela final ===== */
  .painel-final {
    background: #071a0e; border: 2px solid #1d5c33; border-radius: 16px;
    text-align: center; padding: 28px 20px; margin-top: 24px;
  }
  .pontos-finais { font-family: "Courier New", monospace; font-size: 3.2rem; color: #ffd54a; font-weight: 700; }
  .mensagem-final { font-size: 1.4rem; margin: 10px 0 4px; }
  .badge-recorde {
    display: none; background: #ffd54a; color: #073010; font-weight: 800;
    border-radius: 20px; padding: 6px 18px; margin: 12px auto 0; width: fit-content;
    animation: pulsar 1s infinite alternate;
  }
  @keyframes pulsar { to { transform: scale(1.08); } }
  .botoes-finais { display: grid; gap: 10px; margin-top: 22px; }
  #btn-de-novo { background: linear-gradient(180deg, #ffb300, #f57f17); }
  #btn-trocar { background: rgba(255,255,255,.15); }
</style>
</head>
<body>
<main>

  <!-- ===== TELA INICIAL ===== -->
  <section id="tela-inicial" class="ativa">
    <h1>⚽ Quem é o Jogador?</h1>
    <p class="subtitulo">Descubra o craque escondido!</p>

    <p class="grupo-titulo">Modo de jogo</p>
    <div class="opcoes" id="opcoes-modo">
      <button class="opcao selecionada" data-modo="silhueta">🥷 Silhueta<small>sombra total</small></button>
      <button class="opcao" data-modo="embacado">🌫️ Embaçado<small>foto borrada</small></button>
    </div>

    <p class="grupo-titulo">Dificuldade (tamanho do elenco)</p>
    <div class="opcoes quatro" id="opcoes-dificuldade">
      <button class="opcao selecionada" data-dif="60">⚽ 60<small>Famosos</small></button>
      <button class="opcao" data-dif="100">🥈 100<small>Craque</small></button>
      <button class="opcao" data-dif="150">🥇 150<small>Expert</small></button>
      <button class="opcao" data-dif="200">🏆 200<small>Lenda viva</small></button>
    </div>

    <p class="recorde-inicial" id="recorde-inicial"></p>
    <button id="btn-jogar">JOGAR! 🚀</button>
    <div class="aviso-vazio" id="aviso-vazio">
      ⚠️ Sem jogadores carregados.<br>
      Rode: <code>python3 scripts/baixar_jogadores.py</code>
    </div>
    <p style="text-align:center; margin-top:18px;">
      <a href="../" style="color:#ffd54a; text-decoration:none; font-weight:700;">🎮 Outros jogos</a>
    </p>
  </section>

  <!-- ===== TELA DO JOGO ===== -->
  <section id="tela-jogo">
    <div class="placar">
      <span id="placar-rodada">RODADA 1/10</span>
      <span id="placar-pontos">0 PTS</span>
    </div>
    <div class="barra-progresso"><div id="barra"></div></div>

    <div class="moldura-foto"><img id="foto-jogador" alt="Jogador misterioso"></div>

    <button id="btn-dica">💡 Dica (vale menos pontos)</button>
    <p class="dicas" id="texto-dicas"></p>

    <div class="alternativas" id="alternativas"></div>
    <p class="resultado-rodada" id="resultado-rodada"></p>

    <!-- painel de leitura: aparece só no acerto -->
    <div class="painel-craque" id="painel-craque">
      <p class="bio-craque" id="bio-craque"></p>
      <p class="titulo-extimes" id="titulo-extimes">🏟️ Já jogou em</p>
      <div class="extimes" id="extimes"></div>
      <button id="btn-continuar">Continuar ▶</button>
    </div>
  </section>

  <!-- ===== TELA FINAL ===== -->
  <section id="tela-final">
    <h1>🏁 Fim de jogo!</h1>
    <div class="painel-final">
      <div class="pontos-finais" id="pontos-finais">0</div>
      <p class="mensagem-final" id="mensagem-final"></p>
      <p id="acertos-finais"></p>
      <div class="badge-recorde" id="badge-recorde">🏆 NOVO RECORDE!</div>
    </div>
    <div class="botoes-finais">
      <button id="btn-de-novo">Jogar de novo 🔁</button>
      <button id="btn-trocar">Mudar modo / dificuldade ⚙️</button>
    </div>
  </section>

</main>

// ===== Áudio (Web Audio) — destravado no 1º gesto (exigência Safari/iPad) =====
let ctxAudio = null;
function iniciarAudio() {
  if (!ctxAudio) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) ctxAudio = new AC();
  }
  if (ctxAudio && ctxAudio.state === 'suspended') ctxAudio.resume();
}

// Toca bipes com osciladores: acerto agudo, erro grave, vitória em arpejo
function tocarSom(tipo) {
  if (!ctxAudio) return;
  const freqs = { acerto: [880], erro: [180], vitoria: [523, 659, 784, 1047] };
  (freqs[tipo] || []).forEach((f, i) => {
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.15, ctxAudio.currentTime + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, ctxAudio.currentTime + i * 0.12 + 0.25);
    osc.connect(gain).connect(ctxAudio.destination);
    osc.start(ctxAudio.currentTime + i * 0.12);
    osc.stop(ctxAudio.currentTime + i * 0.12 + 0.3);
  });
}

// ===== Recorde — localStorage blindado (file:// privado do Safari pode lançar) =====
function lerRecorde(modo, dif) {
  try { return Number(localStorage.getItem(`quemEOJogador.recorde.${modo}.${dif}`)) || 0; }
  catch { return 0; }
}
function salvarRecorde(modo, dif, pontos) {
  try { localStorage.setItem(`quemEOJogador.recorde.${modo}.${dif}`, String(pontos)); }
  catch { /* sem storage: jogo segue sem recorde */ }
}

function mostrarTela(id) {

  document.getElementById(id).classList.add('ativa');
}
function telaAtiva() {
  const s = document.querySelector('section.ativa');
  return s ? s.id.replace('tela-', '') : '';
}

// ===== Sorteio =====
// Embaralha (Fisher-Yates) e corta até 10 rodadas dentro do pool da dificuldade
function sortearRodadas(pool) {
  const copia = [...pool];
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia.slice(0, Math.min(10, copia.length));
}

// Monta 4 alternativas: correto + 3 distratores da mesma categoria do pool;
// se a categoria tiver menos de 4 no pool, completa com outras categorias
function montarAlternativas(certo, pool) {
  const mesmaCat = pool.filter(j => j.categoria === certo.categoria && j.slug !== certo.slug);
  const outras = pool.filter(j => j.categoria !== certo.categoria);
  const distratores = [];
  for (const fonte of [mesmaCat, outras]) {
    const embaralhada = [...fonte].sort(() => Math.random() - 0.5);
    for (const j of embaralhada) {
      if (distratores.length === 3) break;
      if (!distratores.some(d => d.slug === j.slug)) distratores.push(j);
    }
    if (distratores.length === 3) break;
  }
  return [certo, ...distratores].sort(() => Math.random() - 0.5);
}

// ===== Partida =====
function iniciarPartida() {
  // pool vazio/curto: avisa em vez de quebrar (script de download ainda não rodou)
  if (JOGADORES.length < 8) {
    document.getElementById('aviso-vazio').style.display = 'block';
    return;
  }
  estado.pool = JOGADORES.slice(0, estado.dificuldade);
  estado.rodadas = sortearRodadas(estado.pool);
  estado.rodadaAtual = 0;
  estado.pontos = 0;
  estado.acertos = 0;
  // pré-carrega as imagens da partida (evita flash entre rodadas em tablet lento)
  estado.rodadas.forEach(j => { const img = new Image(); img.src = caminhoFoto(j); });
  mostrarTela('tela-jogo');
  mostrarRodada();
}

function caminhoFoto(jogador) {
  return 'assets/jogadores/' + jogador.slug + '.png';
}

function mostrarRodada() {
  const certo = estado.rodadas[estado.rodadaAtual];
  estado.respondida = false;
  estado.dicasUsadas = 0;
  estado.alternativas = montarAlternativas(certo, estado.pool);

  // aplica o filtro do modo e limpa estado visual da rodada anterior
  const jogo = document.getElementById('tela-jogo');
  const img = document.getElementById('foto-jogador');
  // desliga a transição na troca de rodada: o filtro entra INSTANTÂNEO,
  // senão a foto nova aparece nítida por ~0.8s antes de escurecer/embaçar
  img.style.transition = 'none';
  jogo.className = 'ativa modo-' + estado.modo;
  document.getElementById('texto-dicas').textContent = '';
  document.getElementById('resultado-rodada').textContent = '';
  document.getElementById('btn-dica').disabled = false;
  document.getElementById('painel-craque').classList.remove('visivel');

  img.src = caminhoFoto(certo);
  // imagem quebrada: sorteia substituto do pool e refaz a rodada
  img.onerror = () => substituirJogador(certo);
  // força reflow com a transição desligada e religa só depois,
  // pra revelação e as dicas continuarem animadas
  void img.offsetWidth;
  img.style.transition = '';

  document.getElementById('placar-rodada').textContent =
    `RODADA ${estado.rodadaAtual + 1}/${estado.rodadas.length}`;
  document.getElementById('placar-pontos').textContent = `${estado.pontos} PTS`;
  document.getElementById('barra').style.width =
    (estado.rodadaAtual / estado.rodadas.length * 100) + '%';

  const caixa = document.getElementById('alternativas');
  caixa.innerHTML = '';
  estado.alternativas.forEach((j, i) => {
    const btn = document.createElement('button');
    btn.className = 'alternativa';
    btn.innerHTML = `<span class="tecla">${i + 1}</span>${j.nome}`;
    btn.addEventListener('click', () => responder(i));
    caixa.appendChild(btn);
  });
}

// Troca o jogador da rodada quando o PNG falha (nunca quebra a partida)
function substituirJogador(quebrado) {
  console.warn('imagem ausente, substituindo:', quebrado.slug);
  const usados = new Set(estado.rodadas.map(j => j.slug));
  const candidato = estado.pool.find(j => !usados.has(j.slug));
  if (!candidato) { proximaRodada(); return; }
  estado.rodadas[estado.rodadaAtual] = candidato;
  mostrarRodada();
}

// ===== Resposta (touch, mouse ou teclado) =====
function responder(indice) {
  if (estado.respondida) return;
  estado.respondida = true;

  const certo = estado.rodadas[estado.rodadaAtual];
  const botoes = document.querySelectorAll('.alternativa');
  const indiceCerto = estado.alternativas.findIndex(j => j.slug === certo.slug);
  botoes.forEach(b => b.disabled = true);
  botoes[indiceCerto].classList.add('certa');

  // revela a foto com transição CSS (remove o filtro do modo)
  document.getElementById('tela-jogo').classList.add('revelado');
  document.getElementById('btn-dica').disabled = true;

  const resultado = document.getElementById('resultado-rodada');
  if (indice === indiceCerto) {
    const ganhos = PONTOS_POR_DICA[estado.dicasUsadas];
    estado.pontos += ganhos;
    estado.acertos++;
    resultado.textContent = `✅ É o ${certo.nome}! +${ganhos} pontos`;
    tocarSom('acerto');
    // acertou: mostra o painel de leitura e espera o "Continuar" (sem timer —
    // a criança lê a história no ritmo dela)
    mostrarPainelCraque(certo);
  } else {
    botoes[indice].classList.add('errada');
    resultado.textContent = `❌ Era o ${certo.nome}!`;
    tocarSom('erro');
    setTimeout(proximaRodada, 2200);
  }
  document.getElementById('placar-pontos').textContent = `${estado.pontos} PTS`;
}

// Formata data ISO (2000-07-12) para o padrão brasileiro (12/07/2000)
function formatarData(iso) {
  const [ano, mes, dia] = iso.split('-');
  return `${dia}/${mes}/${ano}`;
}

// Monta e exibe o painel de leitura: nascimento + posição/time + bio + ex-times
function mostrarPainelCraque(j) {
  const bio = document.getElementById('bio-craque');
  bio.textContent = '';
  const frases = [];
  if (j.nascimento) {
    let f = `🎂 Nasceu em ${formatarData(j.nascimento)}`;
    if (j.localNascimento) f += `, em ${j.localNascimento}`;
    frases.push(f + '.');
  }
  const pos = traduzir(POSICOES, j.posicao);
  const aposentado = (j.time || '').startsWith('_');
  frases.push(aposentado
    ? `⚽ Jogava de ${pos} e hoje é uma lenda do futebol.`
    : `⚽ Joga de ${pos} no ${j.time}.`);
  if (j.bio) frases.push(`⭐ ${j.bio}`);
  // montagem via DOM (textContent) — nomes vêm da API, nunca injetar HTML
  frases.forEach(f => {
    const span = document.createElement('span');
    span.textContent = f;
    bio.appendChild(span);
  });

  const caixa = document.getElementById('extimes');
  caixa.innerHTML = '';
  const ex = j.exTimes || [];
  document.getElementById('titulo-extimes').style.display = ex.length ? 'block' : 'none';
  ex.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'extime';
    if (t.escudo) {
      const img = document.createElement('img');
      img.src = 'assets/escudos/' + t.escudo;
      img.alt = '';
      img.onerror = () => img.remove(); // escudo é decorativo: falha some em silêncio
      chip.appendChild(img);
    }
    chip.appendChild(document.createTextNode(t.time + (t.periodo ? ` (${t.periodo})` : '')));
    caixa.appendChild(chip);
  });

  document.getElementById('painel-craque').classList.add('visivel');
}

function proximaRodada() {
  estado.rodadaAtual++;
  if (estado.rodadaAtual >= estado.rodadas.length) {
    telaFinal();
  } else {
    mostrarRodada();
  }
}

// Teclado: 1-4 da fileira e do numpad selecionam a alternativa;
// Enter/Espaço avançam quando o painel de leitura está aberto
document.addEventListener('keydown', (ev) => {
  if (telaAtiva() !== 'jogo') return;
  const painelAberto = document.getElementById('painel-craque').classList.contains('visivel');
  if (painelAberto && (ev.key === 'Enter' || ev.key === ' ')) {
    ev.preventDefault();
    document.getElementById('btn-continuar').click();
    return;
  }
  if (estado.respondida) return;
  let n = null;
  if (ev.key >= '1' && ev.key <= '4') n = Number(ev.key);
  if (/^Numpad[1-4]$/.test(ev.code)) n = Number(ev.code.slice(-1));
  if (n) responder(n - 1);
});

// ===== Dicas progressivas: país → posição → time (reduzem pontos e blur) =====
document.getElementById('btn-dica').addEventListener('click', () => {
  if (estado.respondida || estado.dicasUsadas >= 3) return;
  const certo = estado.rodadas[estado.rodadaAtual];
  // lendas vêm da API com time "_Retired Soccer" — exibe algo amigável
  const timeDica = (certo.time || '').startsWith('_') ? 'Aposentado 🏆' : certo.time;
  const valores = [
    traduzir(PAISES, certo.nacionalidade),
    traduzir(POSICOES, certo.posicao),
    timeDica,
  ];
  estado.dicasUsadas++;
  const partes = [];
  for (let i = 0; i < estado.dicasUsadas; i++) {
    partes.push(`${DICAS_ROTULOS[i]}: ${valores[i] || '?'}`);
  }
  document.getElementById('texto-dicas').textContent = partes.join('  ·  ');
  // no modo embaçado, dica 1 e 2 também reduzem o blur (18 → 12 → 6px)
  const jogo = document.getElementById('tela-jogo');
  if (estado.dicasUsadas <= 2) jogo.classList.add('dica-' + estado.dicasUsadas);
  if (estado.dicasUsadas >= 3) document.getElementById('btn-dica').disabled = true;
});

// ===== Tela final =====
function telaFinal() {
  mostrarTela('tela-final');
  document.getElementById('pontos-finais').textContent = estado.pontos;
  document.getElementById('acertos-finais').textContent =
    `Você acertou ${estado.acertos} de ${estado.rodadas.length} craques`;

  // mensagem por faixa de acerto
  const pct = estado.acertos / estado.rodadas.length;
  let msg = 'Continue treinando! ⚽';
  if (pct >= 0.9) msg = 'CRAQUE DEMAIS! 🏆🔥';
  else if (pct >= 0.7) msg = 'Jogou muito! 🌟';
  else if (pct >= 0.5) msg = 'Quase lá! 💪';
  document.getElementById('mensagem-final').textContent = msg;

  // recorde por combinação modo+dificuldade
  const recorde = lerRecorde(estado.modo, estado.dificuldade);
  const badge = document.getElementById('badge-recorde');
  if (estado.pontos > recorde) {
    salvarRecorde(estado.modo, estado.dificuldade, estado.pontos);
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }
}

// ===== Tela inicial: seleção de modo/dificuldade + recorde =====
function atualizarRecordeInicial() {
  const r = lerRecorde(estado.modo, estado.dificuldade);
  document.getElementById('recorde-inicial').textContent =
    r > 0 ? `🏆 Recorde: ${r} pontos` : 'Sem recorde ainda — seja o primeiro!';
}

function ligarSeletor(idContainer, atributo, aoEscolher) {
  document.querySelectorAll(`#${idContainer} .opcao`).forEach(btn => {
    btn.addEventListener('click', () => {
      iniciarAudio(); // 1º gesto do usuário destrava o som
      document.querySelectorAll(`#${idContainer} .opcao`).forEach(b => b.classList.remove('selecionada'));
      btn.classList.add('selecionada');
      aoEscolher(btn.dataset[atributo]);
      atualizarRecordeInicial();
    });
  });
}

ligarSeletor('opcoes-modo', 'modo', v => estado.modo = v);
ligarSeletor('opcoes-dificuldade', 'dif', v => estado.dificuldade = Number(v));

document.getElementById('btn-jogar').addEventListener('click', () => {
  iniciarAudio();
  iniciarPartida();
});
// Continuar: fecha o painel de leitura e vai pra próxima rodada
document.getElementById('btn-continuar').addEventListener('click', () => {
  document.getElementById('painel-craque').classList.remove('visivel');
  proximaRodada();
});
document.getElementById('btn-de-novo').addEventListener('click', iniciarPartida);
document.getElementById('btn-trocar').addEventListener('click', () => {
  atualizarRecordeInicial();
  mostrarTela('tela-inicial');
});

atualizarRecordeInicial();
</script>
